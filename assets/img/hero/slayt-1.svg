<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Eğitim temalı arka plan görseli">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a3d80"/>
      <stop offset="0.55" stop-color="#1565c0"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.78" cy="0.22" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#g1)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <!-- yumuşak bokeh daireleri -->
  <g fill="#ffffff" opacity="0.06">
    <circle cx="1280" cy="180" r="220"/>
    <circle cx="250" cy="720" r="180"/>
    <circle cx="1450" cy="640" r="120"/>
    <circle cx="120" cy="200" r="90"/>
  </g>
  <g fill="#fde68a" opacity="0.10">
    <circle cx="1120" cy="540" r="70"/>
    <circle cx="520" cy="160" r="40"/>
  </g>
  <!-- büyük soluk açık kitap motifi -->
  <g opacity="0.10" fill="#ffffff" transform="translate(560 340)">
    <path d="M240 40 L40 10 Q20 8 20 28 L20 230 Q20 248 40 250 L240 280 Z"/>
    <path d="M240 40 L440 10 Q460 8 460 28 L460 230 Q460 248 440 250 L240 280 Z"/>
  </g>
  <!-- mezuniyet kepi silüeti -->
