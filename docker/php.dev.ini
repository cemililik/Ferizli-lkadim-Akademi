; Geliştirme için PHP ayarları
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Upload limitleri (görsel yükleme için)
upload_max_filesize = 16M
post_max_size = 20M
max_file_uploads = 20

; Memory
memory_limit = 256M

; Timezone
date.timezone = Europe/Istanbul

; Session
session.gc_maxlifetime = 28800   ; 8 saat
session.cookie_httponly = 1
session.cookie_samesite = Lax
