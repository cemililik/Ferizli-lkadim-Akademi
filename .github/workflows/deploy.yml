name: Deploy to Production

# Tetikleyiciler:
#  - Bir release tagı (v1.0.0 gibi) push edildiğinde otomatik
#  - Veya elle (workflow_dispatch) Actions sekmesinden
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'DB migration adımını atla'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Aynı anda birden fazla deploy çalışmasın (DB migration güvenliği)
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  PHP_VERSION: '8.2'

jobs:
  # ====================================================================
  # 1) Doğrula: syntax + JSON validity
  # ====================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Version'ı tag'den oku
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=manual-$(date +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"
          fi

      - name: PHP'i kur
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          tools: none

      - name: PHP syntax check (tüm .php)
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! php -l "$f" > /dev/null 2>&1; then
              echo "❌ Syntax error: $f"
              php -l "$f" || true
              fail=1
            fi
          done < <(find . -name "*.php" -not -path "./.git/*" -not -path "./vendor/*")
          [[ $fail -eq 0 ]] && echo "✓ Tüm PHP dosyaları geçti"
          exit $fail

      - name: JSON dosyaları validate et
        run: |
          set -e
          while IFS= read -r f; do
            if ! python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"; then
              echo "❌ Geçersiz JSON: $f"
              exit 1
            fi
          done < <(find . -name "*.json" -not -path "./.git/*" -not -path "./node_modules/*")
          echo "✓ Tüm JSON dosyaları geçerli"

  # ====================================================================
  # 2) Deploy: config üret + FTP/FTPS ile dosya yükle
  # ====================================================================
  deploy:
    name: Deploy (${{ needs.validate.outputs.version }})
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.SITE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: PHP'i kur (config üretmek için)
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          tools: none

      - name: api/config.php'yi şablondan üret
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          SITE_URL: ${{ vars.SITE_URL }}
          MIGRATION_SECRET: ${{ secrets.MIGRATION_SECRET }}
          ADMIN_SEED_PASSWORD: ${{ secrets.ADMIN_SEED_PASSWORD }}
        # NOT: `php -r 'KOD'` yaklaşımı tek tırnak kaçışları yüzünden kırılmıştı
        # (lambda içinde "'" karakteri bash outer string'ini kapatıyordu).
        # Heredoc ile PHP'ye stdin'den geçiyoruz — tırnak/escape sorunu yok.
        # Tag 'PHP_EOF' (tırnaklı) ile bash PHP değişkenlerini expand etmez.
        run: |
          php <<'PHP_EOF'
          <?php
          $tpl = file_get_contents("api/config.template.php");
          if ($tpl === false) {
            fwrite(STDERR, "Template okunamadı\n");
            exit(1);
          }
          // Tek tırnaklı string'e güvenli yerleştirme: \ ve ' karakterlerini kaçır.
          $strEsc = fn($v) => str_replace(['\\', "'"], ['\\\\', "\\'"], (string)$v);
          $repl = [
            "__DB_HOST__"          => $strEsc(getenv("DB_HOST") ?: ""),
            "__DB_PORT__"          => (string)(int)(getenv("DB_PORT") ?: 3306),
            "__DB_NAME__"          => $strEsc(getenv("DB_NAME") ?: ""),
            "__DB_USER__"          => $strEsc(getenv("DB_USER") ?: ""),
            "__DB_PASS__"          => $strEsc(getenv("DB_PASS") ?: ""),
            "__SITE_URL__"         => $strEsc(getenv("SITE_URL") ?: ""),
            "__MIGRATION_SECRET__"      => $strEsc(getenv("MIGRATION_SECRET") ?: ""),
            "__ADMIN_SEED_PASSWORD__"   => $strEsc(getenv("ADMIN_SEED_PASSWORD") ?: ""),
          ];
          $out = strtr($tpl, $repl);
          file_put_contents("api/config.php", $out);
          // Sözdizimi kontrolü — bozuk config sunucuda hata verir
          $check = shell_exec("php -l api/config.php 2>&1");
          if (strpos($check, "No syntax errors") === false) {
            fwrite(STDERR, "Üretilen config.php geçersiz:\n" . $check . "\n");
            exit(1);
          }
          echo "✓ api/config.php üretildi (" . strlen($out) . " bayt)\n";
          PHP_EOF

      # FTP/FTPS deploy (GoDaddy shared hosting)
      - name: Dosyaları FTPS ile yükle
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          port: ${{ vars.FTP_PORT || 21 }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          # 'ftps' = FTP over TLS (port 21, AUTH TLS) — şifreli, GoDaddy destekler.
          # Düz 'ftp' güvensiz; sadece son çare olarak kullan.
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          local-dir: ./
          server-dir: ${{ vars.FTP_REMOTE_PATH }}
          # Sunucudaki kullanıcı yüklemeleri (assets/uploads/) korunsun diye
          # dangerous-clean-slate=false: git'te olmayan dosyalar silinmez.
          dangerous-clean-slate: false
          dry-run: ${{ vars.DEPLOY_DRY_RUN == 'true' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.gitignore
            **/.gitkeep
            **/.env
            **/.env.example
            **/.env.local
            **/docker/**
            **/docker-compose.yml
            **/node_modules/**
            **/vendor/**
            **/composer.lock
            **/composer.json
            **/KURUMA_ICERIK_TALEBI.md
            **/KURULUM_HOSTING.md
            **/KURULUM_PHP.md
            **/ANALIZ.md
            **/ANALIZ_UI_UX.md
            **/ADMIN_REHBERI.md
            **/README.md
            **/api/config.template.php
            **/api/config.example.php
            **/*.log
            **/.DS_Store
            **/Thumbs.db

  # ====================================================================
  # 3) Migration: web endpoint'i üzerinden DB güncellemesi
  # ====================================================================
  migrate:
    name: Run database migrations
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_migrations }}
    # NOT: 'environment: production' kasıtlı olarak yok. Repository-level
    # secret'lar (Settings → Secrets and variables → Actions) zaten erişilebilir.
    # Manuel onay sadece deploy job'unda — onaylandıysa migration de geçer.
    steps:
      - name: Migration endpoint'ini tetikle
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          MIGRATION_SECRET: ${{ secrets.MIGRATION_SECRET }}
        run: |
          set -e
          URL="$SITE_URL/api/install/migrate.php"
          echo "→ POST $URL"

          # GoDaddy paylaşımlı hosting WAF/firewall'u, datacenter IP'lerinden
          # (GitHub runner = Azure) ve 'curl' user-agent'ından gelen otomatik
          # istekleri sık sık SESSİZCE düşürür (greylisting) → curl 120s boyunca
          # hiçbir yanıt alamaz (HTTP 000). Buna karşı:
          #   --connect-timeout 15 : bağlantı düzeyi blok 15s'de patlasın (120s değil)
          #   -A <tarayıcı UA>     : naif WAF user-agent kurallarını aşar
          #   3 denemeli retry     : ilk isteği greyleyip sonrakine izin veren WAF'ı geçer
          #   timing breakdown     : takılmanın yeri (connect/tls/ttfb) loga yazılır
          UA="Mozilla/5.0 (compatible; FerizliDeployBot/1.0; +https://ferizliilkadimakademi.com)"
          attempt=0; max=3
          while :; do
            attempt=$((attempt+1))
            echo "── Deneme $attempt/$max ──────────────────────────"
            curl_exit=0
            curl_out=$(curl -sS \
              -w "\n___STATUS:%{http_code}\n___TIME:%{time_total}\n___CONNECT:%{time_connect}\n___TLS:%{time_appconnect}\n___TTFB:%{time_starttransfer}" \
              --connect-timeout 15 \
              --max-time 120 \
              --insecure \
              -A "$UA" \
              -X POST \
              -H "X-Migration-Key: $MIGRATION_SECRET" \
              "$URL" 2>&1) || curl_exit=$?

            status=$(echo "$curl_out"   | grep "___STATUS:"  | cut -d: -f2)
            elapsed=$(echo "$curl_out"  | grep "___TIME:"    | cut -d: -f2)
            tconnect=$(echo "$curl_out" | grep "___CONNECT:" | cut -d: -f2)
            ttls=$(echo "$curl_out"     | grep "___TLS:"     | cut -d: -f2)
            tttfb=$(echo "$curl_out"    | grep "___TTFB:"    | cut -d: -f2)
            body=$(echo "$curl_out" | grep -vE "___(STATUS|TIME|CONNECT|TLS|TTFB):")

            echo "HTTP ${status:-000} | total=${elapsed}s connect=${tconnect}s tls=${ttls}s ttfb=${tttfb}s"
            echo "─── Yanıt ───────────────────────────────"
            echo "$body"
            echo "─────────────────────────────────────────"

            # Başarı
            if [[ "$curl_exit" == "0" && "$status" == "200" ]]; then
              echo "✓ Migration tamamlandı"
              exit 0
            fi

            # Sunucu yanıt verdi ama hata (4xx/5xx) → retry anlamsız, hemen çık
            if [[ "$curl_exit" == "0" && -n "$status" && "$status" != "000" ]]; then
              echo "❌ Migration başarısız (HTTP $status)"
              echo "$body" | python3 -c "import json,sys; d=json.load(sys.stdin); [print('  ✗',h.get('dosya','?'),':',h.get('mesaj','?')) for h in d.get('hatalar',[])]" 2>/dev/null || true
              exit 1
            fi

            # Bağlantı/timeout hatası → nerede takıldığını teşhis et
            echo "⚠ curl exit=$curl_exit (bağlantı/timeout)"
            if [[ -z "$tconnect" || "$tconnect" == "0.000000" ]]; then
              echo "   → TCP bağlantısı hiç kurulamadı: firewall runner IP'sini bloklamış olabilir."
            elif [[ "$ttls" == "0.000000" ]]; then
              echo "   → TLS handshake tamamlanamadı."
            else
              echo "   → Bağlantı kuruldu, sunucu yanıt vermedi (PHP/WAF tarpit)."
            fi

            if [[ $attempt -ge $max ]]; then
              echo "❌ $max deneme de başarısız."
              echo "   Muhtemel kök neden: GoDaddy WAF/firewall otomatik isteği bloklıyor."
              echo "   Kalıcı çözüm seçenekleri:"
              echo "     (1) cPanel'de /api/install/ yolunu veya runner IP'lerini whitelist'le"
              echo "     (2) migrate.php'yi cPanel Cron Job ile sunucu-içi CLI olarak çalıştır (inbound HTTP gerekmez)"
              echo "     (3) endpoint yolunu 'install/migrate' içermeyen bir isimle değiştir"
              exit 1
            fi
            sleep $((attempt * 10))
          done

  # ====================================================================
  # 4) Smoke test: site açılıyor mu?
  # ====================================================================
  smoke-test:
    name: Smoke test
    needs: [deploy, migrate]
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Anasayfa HTTP kontrolü
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          for i in 1 2 3; do
            status=$(curl -sS -o /dev/null -w "%{http_code}" -L --insecure --max-time 30 "$SITE_URL/")
            echo "Deneme $i: HTTP $status"
            if [[ "$status" == "200" ]]; then
              echo "✓ Site ayakta"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Site beklenen yanıtı vermedi"
          exit 1
