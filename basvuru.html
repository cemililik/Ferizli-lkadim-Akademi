<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ön Kayıt / Başvuru</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/assets/img/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#1565c0">
  <meta name="description" content="Ön kayıt başvuru formu.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="İlk Adım Akademi">
  <meta property="og:locale" content="tr_TR">
  <meta property="og:title" content="Ön Kayıt | İlk Adım Akademi">
  <meta property="og:description" content="Ön kayıt başvuru formu.">
  <meta property="og:image" content="/assets/img/favicon/og-default.jpg">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/base.css?v=1.2.0">
  <link rel="stylesheet" href="/assets/css/components.css?v=1.2.0">
  <link rel="stylesheet" href="/assets/css/layout.css?v=1.2.0">
  <link rel="stylesheet" href="/assets/css/pages.css?v=1.2.0">
</head>
<body data-sayfa="basvuru">

  <div id="siteHeaderYer"></div>

  <main id="main">
    <section class="sayfa-basligi">
      <div class="kapsayici">
        <nav class="kirilma-yolu" aria-label="Sayfa konumu">
          <a href="/index.html">Ana Sayfa</a>
          <span>›</span>
          <span data-form-baslik>Ön Kayıt</span>
        </nav>
        <h1 data-form-baslik>Ön Kayıt Formu</h1>
        <p data-form-aciklama>Bilgilerinizi bırakın, en kısa sürede sizinle iletişime geçelim.</p>
      </div>
    </section>

    <section class="bolum">
      <div class="kapsayici kapsayici-dar">
        <!-- formlar.js, URL'deki ?form=... parametresine veya varsayılana göre form gösterir -->
        <div data-form-yer="varsayilan">
          <div style="padding: var(--bosluk-12); text-align: center; color: var(--renk-yazi-soluk);">
            Form yükleniyor…
          </div>
        </div>

        <p style="text-align: center; font-size: var(--yazi-sm); color: var(--renk-yazi-soluk); margin-top: var(--bosluk-6);">
          Form yerine doğrudan iletişime geçmek isterseniz:
          <a href="#" data-float="whatsapp">WhatsApp</a> veya
          <a href="/iletisim.html">iletişim sayfasından</a> bize ulaşabilirsiniz.
        </p>
      </div>
    </section>
  </main>

  <div id="siteFooterYer"></div>
  <div id="floatIkonlarYer"></div>

  <script>
    // URL'den ?form=... yakala, data-form-yer'e set et
    (() => {
      const params = new URLSearchParams(location.search);
      const istenenForm = params.get('form');
      if (istenenForm) {
        const el = document.querySelector('[data-form-yer]');
        if (el) el.dataset.formYer = istenenForm;
      }
    })();
  </script>
  <script src="/assets/js/main.js?v=1.2.0"></script>
  <script src="/assets/js/form-render.js?v=1.2.0"></script>
</body>
</html>
